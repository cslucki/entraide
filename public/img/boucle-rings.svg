<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 660" fill="none">
  <defs>
    <linearGradient id="ringGrad" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#F7C6DC"></stop>
      <stop offset="42%" stop-color="#F0E7DF"></stop>
      <stop offset="100%" stop-color="#C6D6FB"></stop>
    </linearGradient>
    <radialGradient id="blobRose" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FBD3E4" stop-opacity="0.7"></stop>
      <stop offset="100%" stop-color="#FBD3E4" stop-opacity="0"></stop>
    </radialGradient>
    <radialGradient id="blobBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#CFDBFB" stop-opacity="0.7"></stop>
      <stop offset="100%" stop-color="#CFDBFB" stop-opacity="0"></stop>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4"></feGaussianBlur>
    </filter>
  </defs>

  
  <circle cx="230" cy="235" r="180" fill="url(#blobRose)"></circle>
  <circle cx="448" cy="455" r="200" fill="url(#blobBlue)"></circle>

  
  <g filter="url(#soft)" stroke="url(#ringGrad)" fill="none" stroke-linecap="round">
    <circle cx="322" cy="332" r="286" stroke-width="16" opacity="0.55"></circle>
    <circle cx="336" cy="322" r="248" stroke-width="30" opacity="0.50"></circle>
    <circle cx="306" cy="344" r="210" stroke-width="26" opacity="0.46"></circle>
    <circle cx="326" cy="330" r="172" stroke-width="24" opacity="0.40"></circle>
    <circle cx="314" cy="338" r="136" stroke-width="20" opacity="0.34"></circle>
  </g>
</svg>